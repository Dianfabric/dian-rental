<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIAN 샘플북 대여현황</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --primary: #1a1a2e;
      --accent: #e94560;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --badge-rented: #fee2e2;
      --badge-overdue: #fef3c7;
      --badge-available: #dcfce7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.3px; }
    header span { font-size: .8rem; color: #94a3b8; margin-left: 8px; }
    #lastUpdate { font-size: .75rem; color: #94a3b8; }

    /* ── Stats Bar ── */
    #statsBar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--card);
      border-radius: 10px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      border: 1px solid var(--border);
    }
    .stat-chip .num { font-size: 1.3rem; font-weight: 700; }
    .stat-chip.overdue .num { color: var(--orange); }
    .stat-chip.rented .num { color: var(--red); }
    .stat-chip.available .num { color: var(--green); }

    /* ── Filters ── */
    #filterBar {
      padding: 0 24px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    #filterBar select, #filterBar input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      background: var(--card);
      color: var(--text);
      outline: none;
    }
    #filterBar select:focus, #filterBar input:focus {
      border-color: var(--accent);
    }
    #searchInput { min-width: 200px; }
    #refreshBtn {
      margin-left: auto;
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .15s;
    }
    #refreshBtn:hover { opacity: .85; }
    #refreshBtn:disabled { opacity: .5; cursor: default; }

    /* ── View Toggle ── */
    #viewToggle {
      display: flex;
      gap: 4px;
      padding: 0 24px 12px;
    }
    .view-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      font-size: .8rem;
      cursor: pointer;
      color: var(--muted);
    }
    .view-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Content Area ── */
    #content { padding: 0 24px 40px; }

    /* ── PDF 체크박스 & 버튼 ── */
    .group-check {
      width: 18px; height: 18px;
      accent-color: #e94560;
      cursor: pointer;
      flex-shrink: 0;
    }
    #pdfToolbar {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: white;
      padding: 12px 24px; border-radius: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
      align-items: center; gap: 16px;
      z-index: 300; white-space: nowrap;
    }
    #pdfToolbar.show { display: flex; }
    #pdfToolbar span { font-size: .85rem; opacity: .8; }
    #pdfBtn {
      background: #e94560; color: white;
      border: none; border-radius: 20px;
      padding: 8px 20px; font-size: .85rem;
      font-weight: 700; cursor: pointer;
    }
    #pdfBtn:hover { background: #c73652; }
    #clearSelBtn {
      background: transparent; color: #94a3b8;
      border: 1px solid #94a3b8; border-radius: 20px;
      padding: 6px 14px; font-size: .8rem; cursor: pointer;
    }
    #clearSelBtn:hover { color: white; border-color: white; }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Card Grid ── */
    #cardGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border: 1px solid var(--border);
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .card.overdue { border-top: 3px solid var(--orange); }
    .card.rented  { border-top: 3px solid var(--red); }

    .card-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: #f1f5f9;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #94a3b8;
    }
    .card-body { padding: 12px 14px 14px; }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-brand {
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-client {
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .card-dates {
      font-size: .75rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .card-dates span { font-weight: 600; color: var(--text); }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .badge {
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
    }
    .badge.overdue { background: var(--badge-overdue); color: #92400e; }
    .badge.rented  { background: var(--badge-rented);  color: #991b1b; }
    .card-manager { font-size: .72rem; color: var(--muted); }
    .overdue-days {
      font-size: .72rem;
      font-weight: 700;
      color: var(--orange);
    }

    /* ── Table View ── */
    #tableWrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      font-size: .82rem;
    }
    th {
      background: var(--primary);
      color: #fff;
      padding: 11px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    tr.overdue td:first-child { border-left: 3px solid var(--orange); }
    tr.rented  td:first-child { border-left: 3px solid var(--red); }
    .tbl-thumb {
      width: 40px; height: 54px;
      object-fit: cover;
      border-radius: 4px;
      background: #e2e8f0;
    }
    .tbl-thumb-placeholder {
      width: 40px; height: 54px;
      border-radius: 4px;
      background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      color: #94a3b8;
    }

    /* ── Group View ── */
    .group-section { margin-bottom: 24px; }
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: .9rem;
    }
    .group-count {
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      padding: 2px 8px;
      font-size: .75rem;
    }
    .group-overdue { background: #92400e; }

    /* ── Empty ── */
    #empty {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--card);
      border-radius: 16px;
      max-width: 480px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    #modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: var(--muted);
    }
    #modal img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    #modal h2 { font-size: 1.3rem; margin-bottom: 4px; }
    #modal .brand-tag { color: var(--muted); font-size: .8rem; margin-bottom: 14px; }
    #modal .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    #modal .row:last-child { border-bottom: none; }
    #modal .row label { color: var(--muted); }
    #modal .row span { font-weight: 600; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<header>
  <div>
    <h1>📚 DIAN 샘플북 대여현황</h1>
    <span id="totalCount"></span>
  </div>
  <div id="lastUpdate"></div>
</header>

<div id="statsBar">
  <div class="stat-chip overdue">
    <div class="num" id="statOverdue">-</div>
    <div>🚨 연체중</div>
  </div>
  <div class="stat-chip rented">
    <div class="num" id="statRented">-</div>
    <div>🔴 대여중</div>
  </div>
  <div class="stat-chip available">
    <div class="num" id="statAvailable">-</div>
    <div>🟢 대여가능</div>
  </div>
</div>

<div id="filterBar">
  <input id="searchInput" type="text" placeholder="🔍 샘플북명 / 거래처 / 브랜드 검색..." />
  <select id="filterStatus">
    <option value="">전체 상태</option>
    <option value="overdue">🚨 연체중만</option>
    <option value="rented">🔴 대여중만</option>
    <option value="available">🟢 대여가능만</option>
  </select>
  <select id="filterBrand">
    <option value="">전체 브랜드</option>
  </select>
  <select id="filterManager">
    <option value="">전체 담당자</option>
  </select>
  <select id="sortBy">
    <option value="name">이름순</option>
    <option value="overdue_desc">연체일 긴순</option>
    <option value="rental_date_asc">대여일 오래된순</option>
    <option value="rental_date_desc">대여일 최신순</option>
  </select>
  <button id="refreshBtn" onclick="loadData()">🔄 새로고침</button>
</div>

<div id="viewToggle">
  <button class="view-btn active" onclick="setView('card')">카드</button>
  <button class="view-btn" onclick="setView('table')">테이블</button>
  <button class="view-btn" onclick="setView('group')">거래처별</button>
</div>

<div id="content">
  <div id="loading">
    <div class="spinner"></div>
    <p>데이터 불러오는 중...</p>
  </div>
  <div id="cardGrid" style="display:none;"></div>
  <div id="tableWrap" style="display:none;">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>샘플북</th>
          <th>브랜드</th>
          <th>거래처</th>
          <th>전화번호</th>
          <th>대여일</th>
          <th>반납예정일</th>
          <th>연체일수</th>
          <th>담당자</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div id="groupView" style="display:none;"></div>
  <div id="empty" style="display:none;">조건에 맞는 샘플북이 없습니다.</div>
</div>

<!-- PDF 툴바 -->
<div id="pdfToolbar">
  <span id="pdfSelCount">0개 거래처 선택됨</span>
  <button id="clearSelBtn" onclick="clearSelection()">선택 해제</button>
  <button id="pdfBtn" onclick="makePDF()">📄 PDF 만들기</button>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SAMPLE_TABLE = 'tbleNmiEGITKO6knr';
const CLIENT_TABLE = 'tblSCHwKL8RQXSJKS';
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let allRecords = [];
let currentView = 'card';

// ── Airtable API (토큰은 서버에서 처리) ──
async function fetchAll(tableId, filter = '', fields = []) {
  let records = [];
  let offset = null;
  do {
    const params = new URLSearchParams({ tableId });
    if (filter) params.set('filter', filter);
    if (fields.length) params.set('fields', fields.join(','));
    if (offset) params.set('offset', offset);
    const res = await fetch(`/api/airtable?${params}`);
    if (!res.ok) throw new Error(`API Error: ${res.status}`);
    const data = await res.json();
    records = records.concat(data.records);
    offset = data.offset;
  } while (offset);
  return records;
}

// ── Load Data ──
async function loadData() {
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  ['cardGrid','tableWrap','groupView','empty'].forEach(id => document.getElementById(id).style.display = 'none');

  try {
    // 대여중 + 연체 샘플북 전체 조회 (대여 일 있는 것들)
    const raw = await fetchAll(
      SAMPLE_TABLE,
      `NOT({대여 일} = "")`,
      ['샘플북 이름','브랜드','대여 상태','대여중인 거래처','대여 일','반납일','이미지','담당자','첫 원단 이름','북 or 헹거']
    );

    // 거래처 이름 빠른 조회용 맵 (linked record id → name)
    // 샘플북의 대여중인 거래처 필드는 record ID 배열이므로 별도 조회 필요
    const clientIds = [...new Set(raw.flatMap(r => r.fields['대여중인 거래처'] || []))];
    let clientMap = {};
    if (clientIds.length > 0) {
      // 최대 100개씩 조회
      const chunks = [];
      for (let i = 0; i < clientIds.length; i += 30) chunks.push(clientIds.slice(i, i+30));
      for (const chunk of chunks) {
        const formula = `OR(${chunk.map(id => `RECORD_ID()="${id}"`).join(',')})`;
        const clients = await fetchAll(CLIENT_TABLE, formula, ['거래처 이름','전화번호']);
        clients.forEach(c => { clientMap[c.id] = { name: c.fields['거래처 이름'] || '', phone: c.fields['전화번호'] || '' }; });
      }
    }

    // 데이터 정규화
    allRecords = raw.map(r => {
      const f = r.fields;
      const rentDate = f['대여 일'] ? new Date(f['대여 일']) : null;
      const returnDate = f['반납일'] ? new Date(f['반납일']) : null;
      const clientIds = f['대여중인 거래처'] || [];
      const clientName  = clientIds.map(id => clientMap[id]?.name  || '').filter(Boolean).join(', ');
      const clientPhone = clientIds.map(id => clientMap[id]?.phone || '').filter(Boolean).join(', ');

      let overdueDays = 0;
      let status = 'available'; // 대여가능
      if (rentDate) {
        if (returnDate && TODAY > returnDate) {
          overdueDays = Math.floor((TODAY - returnDate) / 86400000);
          status = 'overdue';
        } else {
          status = 'rented';
        }
      }

      const imgs = f['이미지'] || [];
      const thumbUrl = imgs.length > 0 ? (imgs[0].thumbnails?.large?.url || imgs[0].url) : null;
      const fullUrl  = imgs.length > 0 ? imgs[0].url : null;

      return {
        id: r.id,
        name: f['샘플북 이름'] || '',
        brand: f['브랜드'] || '',
        status,
        clientName,
        rentDate: f['대여 일'] || null,
        returnDate: f['반납일'] || null,
        overdueDays,
        thumbUrl,
        fullUrl,
        imgCount: imgs.length,
        clientPhone,
        manager: f['담당자'] || '',
        fabric: f['첫 원단 이름'] || '',
        type: f['북 or 헹거'] || '',
      };
    });

    updateStats();
    populateFilters();
    renderView();

    document.getElementById('lastUpdate').textContent =
      '갱신: ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    document.getElementById('loading').innerHTML = `<p style="color:red">오류: ${e.message}</p>`;
    return;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('refreshBtn').disabled = false;
}

// ── Stats ──
function updateStats() {
  const overdue   = allRecords.filter(r => r.status === 'overdue').length;
  const rented    = allRecords.filter(r => r.status === 'rented').length;
  const available = allRecords.filter(r => r.status === 'available').length;
  document.getElementById('statOverdue').textContent   = overdue;
  document.getElementById('statRented').textContent    = rented;
  document.getElementById('statAvailable').textContent = available;
}

// ── Populate Filters ──
function populateFilters() {
  const brands   = [...new Set(allRecords.map(r => r.brand).filter(Boolean))].sort();
  const managers = [...new Set(allRecords.map(r => r.manager).filter(Boolean))].sort();

  const brandSel = document.getElementById('filterBrand');
  brandSel.innerHTML = '<option value="">전체 브랜드</option>';
  brands.forEach(b => { brandSel.innerHTML += `<option value="${b}">${b}</option>`; });

  const mgSel = document.getElementById('filterManager');
  mgSel.innerHTML = '<option value="">전체 담당자</option>';
  managers.forEach(m => { mgSel.innerHTML += `<option value="${m}">${m}</option>`; });
}

// ── Filter + Sort ──
function getFiltered() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const brand  = document.getElementById('filterBrand').value;
  const manager= document.getElementById('filterManager').value;
  const sort   = document.getElementById('sortBy').value;

  let records = allRecords.filter(r => {
    if (status === 'overdue'   && r.status !== 'overdue')   return false;
    if (status === 'rented'    && r.status !== 'rented')    return false;
    if (status === 'available' && r.status !== 'available') return false;
    if (brand   && r.brand   !== brand)   return false;
    if (manager && r.manager !== manager) return false;
    if (q && !(r.name.toLowerCase().includes(q) ||
               r.clientName.toLowerCase().includes(q) ||
               r.brand.toLowerCase().includes(q) ||
               r.fabric.toLowerCase().includes(q))) return false;
    return true;
  });

  records.sort((a, b) => {
    if (sort === 'name')             return a.name.localeCompare(b.name, 'ko');
    if (sort === 'overdue_desc')     return b.overdueDays - a.overdueDays;
    if (sort === 'rental_date_asc')  return (a.rentDate || '').localeCompare(b.rentDate || '');
    if (sort === 'rental_date_desc') return (b.rentDate || '').localeCompare(a.rentDate || '');
    return 0;
  });

  return records;
}

// ── View Switching ──
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['card','table','group'][i] === v);
  });
  renderView();
}

function renderView() {
  const records = getFiltered();
  document.getElementById('totalCount').textContent = `(${records.length}건)`;
  ['cardGrid','tableWrap','groupView','empty'].forEach(id => document.getElementById(id).style.display = 'none');

  if (records.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  if (currentView === 'card')  renderCards(records);
  if (currentView === 'table') renderTable(records);
  if (currentView === 'group') renderGroup(records);
}

// ── Card View ──
function renderCards(records) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = records.map(r => cardHTML(r)).join('');
  grid.style.display = 'grid';
}

function cardHTML(r) {
  const imgTag = r.thumbUrl
    ? `<img class="card-img" src="${r.thumbUrl}" loading="lazy" alt="${r.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholderTag = `<div class="card-img-placeholder" style="${r.thumbUrl ? 'display:none' : ''}">📘</div>`;

  const badge = r.status === 'overdue'
    ? `<span class="badge overdue">🚨 연체중</span><span class="overdue-days">${r.overdueDays}일 초과</span>`
    : `<span class="badge rented">🔴 대여중</span>`;

  return `
  <div class="card ${r.status}" onclick="openModal('${r.id}')">
    ${imgTag}${placeholderTag}
    <div class="card-body">
      <div class="card-title">${r.name}</div>
      <div class="card-brand">${r.brand} ${r.type ? '· ' + r.type : ''}</div>
      ${r.clientName ? `<div class="card-client">📦 ${r.clientName}</div>` : ''}
      ${r.clientPhone ? `<div class="card-brand">📞 ${r.clientPhone}</div>` : ''}
      <div class="card-dates">
        대여일 <span>${r.rentDate || '-'}</span><br>
        반납예정 <span>${r.returnDate || '-'}</span>
      </div>
      <div class="card-footer">
        ${badge}
        ${r.manager ? `<span class="card-manager">👤 ${r.manager}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Table View ──
function renderTable(records) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = records.map(r => {
    const thumb = r.thumbUrl
      ? `<img class="tbl-thumb" src="${r.thumbUrl}" loading="lazy" alt="${r.name}" onerror="this.outerHTML='<div class=tbl-thumb-placeholder>📘</div>'">`
      : `<div class="tbl-thumb-placeholder">📘</div>`;
    const badge = r.status === 'overdue'
      ? `<span class="badge overdue">🚨 연체</span>`
      : `<span class="badge rented">🔴 대여</span>`;
    const overdueDays = r.overdueDays > 0 ? `<span style="color:var(--orange);font-weight:700">+${r.overdueDays}일</span>` : '-';

    return `<tr class="${r.status}" onclick="openModal('${r.id}')" style="cursor:pointer">
      <td>${thumb}</td>
      <td><strong>${r.name}</strong></td>
      <td>${r.brand}</td>
      <td>${r.clientName || '-'}</td>
      <td>${r.clientPhone ? `<a href="tel:${r.clientPhone}" style="color:inherit;text-decoration:none">${r.clientPhone}</a>` : '-'}</td>
      <td>${r.rentDate || '-'}</td>
      <td>${r.returnDate || '-'}</td>
      <td>${overdueDays}</td>
      <td>${r.manager || '-'}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').style.display = 'block';
}

// ── Group View (by client) ──
let selectedClients = new Set();

function renderGroup(records) {
  // 담당자 필터가 걸린 경우: 해당 담당자가 빌려준 거래처의 전체 항목을 표시
  const managerFilter = document.getElementById('filterManager').value;
  let groupRecords = records;
  if (managerFilter) {
    const matchedClients = new Set(records.map(r => r.clientName || '(거래처 없음)'));
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const brand  = document.getElementById('filterBrand').value;
    groupRecords = allRecords.filter(r => {
      const key = r.clientName || '(거래처 없음)';
      if (!matchedClients.has(key)) return false;
      if (status === 'overdue'   && r.status !== 'overdue')   return false;
      if (status === 'rented'    && r.status !== 'rented')    return false;
      if (status === 'available' && r.status !== 'available') return false;
      if (brand && r.brand !== brand) return false;
      if (q && !(r.name.toLowerCase().includes(q) ||
                 (r.clientName || '').toLowerCase().includes(q) ||
                 r.brand.toLowerCase().includes(q) ||
                 r.fabric.toLowerCase().includes(q))) return false;
      return true;
    });
  }

  const byClient = {};
  groupRecords.forEach(r => {
    const key = r.clientName || '(거래처 없음)';
    if (!byClient[key]) byClient[key] = { overdue: 0, rented: 0, items: [], phone: r.clientPhone || '' };
    byClient[key].items.push(r);
    if (r.status === 'overdue') byClient[key].overdue++;
    else byClient[key].rented++;
  });

  const sorted = Object.entries(byClient).sort(([,a],[,b]) => b.overdue - a.overdue);

  const groupView = document.getElementById('groupView');
  groupView.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:.85rem;color:var(--muted)">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" class="group-check" id="checkAll" onchange="toggleAll(this.checked)">
        전체 선택
      </label>
    </div>` +
  sorted.map(([name, info]) => {
    const isChecked = selectedClients.has(name) ? 'checked' : '';
    const headerClass = info.overdue > 0 ? 'group-header group-overdue' : 'group-header';
    const overdueTag = info.overdue > 0
      ? `<span class="group-count" style="background:rgba(255,255,255,.4)">🚨 연체 ${info.overdue}</span>` : '';

    // 담당자별 대여 수 집계 → 많은 순으로 표시
    const mgrCount = {};
    info.items.forEach(r => { if (r.manager) mgrCount[r.manager] = (mgrCount[r.manager] || 0) + 1; });
    const mgrList = Object.entries(mgrCount).sort(([,a],[,b]) => b - a).map(([m]) => m);
    const mgrBadges = mgrList.map(m =>
      `<span style="font-size:.7rem;opacity:.8;display:block;text-align:right;line-height:1.5">${m}</span>`
    ).join('');

    const cardsMini = info.items.map(r => {
      const thumb = r.thumbUrl
        ? `<img style="width:50px;height:68px;object-fit:cover;border-radius:6px;cursor:pointer" src="${r.thumbUrl}" loading="lazy" onclick="openModal('${r.id}')" onerror="this.style.display='none'">`
        : '';
      return `<div style="text-align:center;cursor:pointer" onclick="openModal('${r.id}')">
        ${thumb}
        <div style="font-size:.65rem;margin-top:3px;color:var(--text)">${r.name}</div>
        ${r.status === 'overdue' ? `<div style="font-size:.6rem;color:var(--orange)">+${r.overdueDays}일</div>` : ''}
      </div>`;
    }).join('');

    return `<div class="group-section">
      <div class="${headerClass}" style="gap:10px">
        <input type="checkbox" class="group-check" data-client="${name}" ${isChecked} onchange="toggleClient('${name}', this.checked)">
        <span style="flex:1">📦 ${addNim(name)}</span>
        <span class="group-count">총 ${info.items.length}건</span>
        ${overdueTag}
        <div>${mgrBadges}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;padding:4px 2px;">
        ${cardsMini}
      </div>
    </div>`;
  }).join('');

  groupView.style.display = 'block';
  updatePdfToolbar();
}

function toggleClient(name, checked) {
  if (checked) selectedClients.add(name);
  else selectedClients.delete(name);
  updatePdfToolbar();
}

function toggleAll(checked) {
  document.querySelectorAll('[data-client]').forEach(cb => {
    cb.checked = checked;
    if (checked) selectedClients.add(cb.dataset.client);
    else selectedClients.delete(cb.dataset.client);
  });
  updatePdfToolbar();
}

function clearSelection() {
  selectedClients.clear();
  document.querySelectorAll('[data-client]').forEach(cb => cb.checked = false);
  const checkAll = document.getElementById('checkAll');
  if (checkAll) checkAll.checked = false;
  updatePdfToolbar();
}

function updatePdfToolbar() {
  const toolbar = document.getElementById('pdfToolbar');
  const count = selectedClients.size;
  document.getElementById('pdfSelCount').textContent = `${count}개 거래처 선택됨`;
  toolbar.classList.toggle('show', count > 0);
}

// ── 님 붙이기 ──
function addNim(name) {
  if (!name || name.endsWith('님')) return name;

  const titles = [
    '팀장','과장','실장','대표','디자이너','이사','대리','부장','사장',
    '원장','소장','매니저','주임','차장','선임','책임','수석','상무',
    '전무','사원','직원','담당자','담당','인테리어'
  ];

  // 괄호로 끝나는 경우: 보눔(지은옥실장) → 보눔(지은옥실장님), 이공간디자인(송혜란) → 이공간디자인(송혜란님)
  const parenMatch = name.match(/^(.*)\(([^)]+)\)$/);
  if (parenMatch) {
    const inside = parenMatch[2];
    if (titles.some(t => inside.endsWith(t)) || /^[가-힣]{2,4}$/.test(inside)) {
      return parenMatch[1] + '(' + inside + '님)';
    }
    return name;
  }

  // 직접 직책으로 끝나는 경우: 김수옥팀장 → 김수옥팀장님
  if (titles.some(t => name.endsWith(t))) {
    return name + '님';
  }

  return name;
}

// ── PDF 생성 (거래처별 개별 파일, 3×3=9장씩 페이지 분리) ──
async function makePDF() {
  const clients = [...selectedClients];
  if (!clients.length) return;

  const btn = document.getElementById('pdfBtn');
  btn.disabled = true;
  const originalHTML = btn.innerHTML;
  const today = new Date().toLocaleDateString('ko-KR');

  for (let i = 0; i < clients.length; i++) {
    const cname = clients[i];
    btn.innerHTML = `⏳ ${i + 1}/${clients.length} 생성 중...`;

    const items = allRecords
      .filter(r => (r.clientName || '(거래처 없음)') === cname)
      .sort((a, b) => (a.rentDate || '').localeCompare(b.rentDate || ''));
    const phone = items[0]?.clientPhone || '';
    const displayName = addNim(cname);

    // 아이템 수에 따라 이미지 높이 자동 계산 → 무조건 1페이지
    // A4 여백 8mm: 페이지 컨텐츠 1149px, 오버헤드 115px, 카드 정보 74px
    const rows = Math.ceil(items.length / 3);
    const IMG_H = Math.max(60, Math.floor(1034 / rows * 0.93) - 74);

    const buildCard = r => {
      const imgHtml = r.thumbUrl
        ? `<img src="${r.thumbUrl}" crossorigin="anonymous" style="width:100%;height:${IMG_H}px;object-fit:cover;display:block;background:#f1f5f9">`
        : `<div style="width:100%;height:${IMG_H}px;background:#e9ecef;display:flex;align-items:center;justify-content:center;font-size:26px;color:#94a3b8">-</div>`;
      const overdueHtml = r.overdueDays > 0
        ? `<span style="margin-top:4px;background:#fce8e6;color:#c5221f;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;display:inline-block">+${r.overdueDays}일 연체</span>`
        : `<span style="margin-top:4px;background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;display:inline-block">대여중</span>`;
      return `<div style="width:33.333%;box-sizing:border-box;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
        ${imgHtml}
        <div style="padding:7px 9px">
          <div style="font-weight:700;font-size:10.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:#64748b;margin-bottom:2px"><span style="color:#94a3b8">대여일</span><span>${r.rentDate || '-'}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:#64748b;margin-bottom:2px"><span style="color:#94a3b8">반납예정</span><span>${r.returnDate || '-'}</span></div>
          ${overdueHtml}
        </div>
      </div>`;
    };

    const html = `<div style="font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#1e293b;background:white;width:794px">
      <div style="background:#1a1a2e;color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:15px;font-weight:800">DIAN 샘플북 대여현황</div>
          <div style="font-size:10px;opacity:.65;margin-top:2px">${items.length}개 샘플북</div>
        </div>
        <div style="font-size:10px;opacity:.7">출력일: ${today}</div>
      </div>
      <div style="padding:14px 16px 16px">
        <div style="background:#334155;color:white;padding:7px 14px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:700">${displayName}</span>
          <span style="font-size:10px;opacity:.7">${phone ? phone + '  · ' : ''}총 ${items.length}건</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;overflow:hidden">
          ${items.map(buildCard).join('')}
        </div>
      </div>
    </div>`;

    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:-9999px;top:0;background:white;z-index:-1';
    container.innerHTML = html;
    document.body.appendChild(container);

    await new Promise(resolve => {
      const imgs = container.querySelectorAll('img');
      if (!imgs.length) { resolve(); return; }
      let done = 0;
      const check = () => { if (++done >= imgs.length) resolve(); };
      imgs.forEach(img => {
        if (img.complete) check();
        else { img.onload = check; img.onerror = check; }
      });
      setTimeout(resolve, 10000);
    });

    const safeFilename = addNim(cname).replace(/[\\/:*?"<>|]/g, '_');
    await html2pdf().set({
      margin: [8, 8, 8, 8],
      filename: `${safeFilename} 샘플북대여현황.pdf`,
      image: { type: 'jpeg', quality: 0.9 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(container.firstElementChild).save();

    document.body.removeChild(container);
  }

  btn.disabled = false;
  btn.innerHTML = originalHTML;
}

// ── Modal ──
function openModal(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;

  const imgTag = r.fullUrl
    ? `<img src="${r.fullUrl}" alt="${r.name}" onerror="this.style.display='none'">`
    : '';

  const badge = r.status === 'overdue'
    ? `<span class="badge overdue">🚨 연체중 (+${r.overdueDays}일)</span>`
    : `<span class="badge rented">🔴 대여중</span>`;

  document.getElementById('modal-content').innerHTML = `
    ${imgTag}
    <h2>${r.name}</h2>
    <div class="brand-tag">${r.brand} ${r.type ? '· ' + r.type : ''} ${r.imgCount > 1 ? `· 이미지 ${r.imgCount}장` : ''}</div>
    ${badge}
    <br><br>
    <div class="row"><label>거래처</label><span>${r.clientName || '-'}</span></div>
    ${r.clientPhone ? `<div class="row"><label>전화번호</label><span><a href="tel:${r.clientPhone}" style="color:var(--accent)">${r.clientPhone}</a></span></div>` : ''}
    <div class="row"><label>대여일</label><span>${r.rentDate || '-'}</span></div>
    <div class="row"><label>반납예정일</label><span>${r.returnDate || '-'}</span></div>
    ${r.overdueDays > 0 ? `<div class="row"><label>연체일수</label><span style="color:var(--orange)">+${r.overdueDays}일</span></div>` : ''}
    <div class="row"><label>담당자</label><span>${r.manager || '-'}</span></div>
    ${r.fabric ? `<div class="row"><label>수록원단</label><span>${r.fabric.split('\n')[0]}</span></div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── Event Listeners ──
['searchInput','filterStatus','filterBrand','filterManager','sortBy'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderView);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

// ── Init ──
loadData();
</script>
